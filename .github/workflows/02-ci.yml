# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

# env:                         
#   PYTHON_VERSION: "3.12"
  
on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  # Allow a safe manual run before students trigger it with a code change.
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ${{matrix.os}}

    strategy:
      matrix:
        python_version: ["3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          # python-version: ${{env.PYTHON_VERSION}}
          # python-version: ${{secrets.PYTHON_VERSION}}
          python-version: ${{matrix.python_version}}
          

      - name: Verify environment
        run: |
          echo "Repo contents:"
          ls -la
          echo "Python version:"
          python --version
          
      - name: Show runner time
        run: date

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

  trivy-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   
      
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run Trivy filesystem & Dockerfile scan
        # uses: aquasecurity/trivy-action@<pin-to-commit-sha>   # replace with real SHA
        # uses: aquasecurity/trivy-action@0.36.0
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      # - name: Upload results to GitHub Security tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()   # upload even if the scan step failed/exited non-zero
      #   with:
      #     sarif_file: "trivy-results.sarif"
